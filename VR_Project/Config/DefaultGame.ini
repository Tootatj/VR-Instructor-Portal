; USignalingSubsystem — speaks the Web_Dashboard wire protocol.
; ServerUrl MUST be reachable from the headset over the same LAN. 127.0.0.1
; will NOT work (that's the Quest itself); use the dev machine's LAN IPv4
; (PowerShell: `Get-NetIPAddress -AddressFamily IPv4`).
;
; Override per-developer without committing by editing
; Saved/Config/Windows/Game.ini in the same section.
[/Script/VR_Project.SignalingSubsystem]
; URL must be quoted — UE's INI parser truncates unquoted values at the ":"
; before "//", producing "http:" for "http://host:3000".
ServerUrl="http://192.168.50.162:3000"
; TenantId is now a DEV FALLBACK only — Phase 6D moved tenant ownership
; to UTenantRegistry (the persisted first-launch redemption). The
; registry's ResolveTenantIdForSignaling() returns this value only when
; no registration has been redeemed AND bAllowUnregisteredBoot=true on
; the registry. Once WBP_RegistrationGate is wired in the editor, this
; line stops being read in normal flow.
TenantId=onebonsai
Scenario=Fire Training
TraineeName=Quest Trainee

; 2026-06-15 — per-app interactive control plane.
; AppId is the dashboard's lookup key for the per-app UI module
; (Web_Dashboard/public/js/apps/<AppId>.js). When porting this signaling
; layer to a different VR project, change AppId to the new project's
; identifier (PascalCase, no spaces, e.g. "VRForklift"). AppVersion is
; free-form; useful when one app evolves its state machine across
; releases. Both keys are optional — leaving them blank results in a
; generic video-only dashboard panel with no app-specific controls.
;
; Wire format + state-machine conventions: Web_Dashboard/docs/state-updates.md
; Command schema:                          Web_Dashboard/docs/commands.md
AppId=VRFT
AppVersion=1.0.0

; UTenantRegistry — owns the persisted device->tenant binding from the
; first-launch code redemption (Phase 6D). ServerUrl falls back to the
; SignalingSubsystem URL above when omitted — they always point at the
; same Web_Dashboard instance in practice.
;
; bAllowUnregisteredBoot:
;   true  (dev/CI): boot the signaling subsystem with the INI fallback
;         tenant above if no registration file exists yet. Keeps the
;         existing onebonsai-only flow working until WBP_RegistrationGate
;         is wired into BP_VRPawn::BeginPlay.
;   false (prod):   block signaling boot until the user redeems a code.
;         BP_VRPawn must show WBP_RegistrationGate (or any host-app
;         code-input panel) BEFORE expecting OnCredentialsReady to fire.
[/Script/VR_Project.TenantRegistry]
bAllowUnregisteredBoot=False
