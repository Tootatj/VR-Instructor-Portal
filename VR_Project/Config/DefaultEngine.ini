; Universal cross-vendor VR config (Quest + Pico from one APK).
;   - bPackageForMetaQuest=True keeps Quest's launcher treating us as immersive
;     (adds com.oculus.intent.category.VR + focusaware + ossplash to the
;     manifest at cook time).
;   - PICOXR plugin's UPL injects the Pico-side markers (pvr.app.type=vr,
;     PXR runtime libs, IsOculusMobileApplication Java stub) so Pico's
;     launcher also treats us as immersive.
;   - MinSDKVersion=29 is the lowest common: Pico 4E runs PICO OS on Android
;     10 base = API 29; Quest is fine with anything <= 32 for sideloaded
;     dev builds (Meta's API 32 floor is a *store* check, not an install one).
;   - At runtime the two HMD providers self-elect: PICOXRHMD activates if it
;     finds the PICO runtime, OpenXR/Quest activates if it finds the Meta
;     runtime. One device, one wins, no conflict.
;
; Trade-offs:
;   - APK is ~50 MB larger (PICOXR's native libs baked in)
;   - If we ever ship to the Meta store, separate the configs: revert
;     MinSDKVersion=32 and disable the PICOXR plugin for that cook.
MinSDKVersion=29
TargetSDKVersion=34
bEnableDynamicMaxFPS=True
ExtraApplicationSettings=<meta-data android:name="com.oculus.supportedDevices" android:value="quest|quest2|questpro|quest3" />
bPackageForMetaQuest=True
bShowLaunchImage=False

; Phase 7 instructor-view rebuild (2026-06-15): the BP_InstructorViewLogic
; component opens a Quest passthrough camera stream via AndroidMedia's
; vidcap://rear MediaSource to overlay on top of the hijacked VR frame.
; That requires CAMERA permission at runtime; the OS will prompt the user
; on first MR toggle. Pico passthrough doesn't go through this code path
; (PICOXR exposes seethrough via its own plugin API, not MediaSource), so
; CAMERA is effectively a Quest-only permission for now — Pico builds
; ship with the perm but never request it at runtime.
+ExtraPermissions=android.permission.CAMERA

; --- Universal-APK HMD priority (Phase 6D fix) ---
; Without an explicit priority, OpenXR (Epic's, what Meta Quest uses) and
; PICOXRHMD both load at PostConfigInit and race for HMD selection. The
; race outcome is non-deterministic: it worked by luck on the earliest
; universal cook (rev d65bc98), then flipped on the Phase 6D cook and
; PICOXRHMD won on the Quest — which crashes immediately because there's
; no PXR runtime to give it a render-target size:
;
;   Assertion failed: InOutSizeX != 0 && InOutSizeY != 0
;   [File:.../PICOXR/Source/PICOXRHMD/Private/PXR_HMD.cpp] [Line: 2691]
;   [Callstack] FPICOXRHMD::CalculateRenderTargetSize ... FSceneViewport::InitRHI
;
; Higher priority = preferred. The original Phase 6D intent was "same APK,
; deterministic selection per device": OpenXR=10 wins on Quest (Meta
; runtime), and on Pico OpenXR was expected to fail self-election so
; PICOXR=0 would win by fallback. The Pico half of that turned out to
; be wrong (see Devlog 2026-06-08): Pico ships its own generic OpenXR
; runtime layer, so OpenXR=10 also wins on Pico and ANRs the cold boot.
; The fix is no longer "universal APK + magic priority", it's "per-device
; cook" -- see the per-device-cook block below for the canonical workflow.

; --- Per-device cook model (the canonical workflow) ---
; The values below are the QUEST baseline. They are what the editor's VR
; Preview / PIE uses for in-editor Quest+Link development. They are also
; what a "naive" UAT cook from this checkout produces -- correct for
; Quest, would ANR on Pico cold-boot.
;
; For Pico cooks, DO NOT hand-edit this file. Use the per-device wrapper:
;     .\Tools\Cook-VRApp.ps1 -Device pico
; The script temporarily flips OpenXR=0 / PICOXRHMD=10 for the duration
; of UAT, restores this file via a guaranteed finally block, and renames
; the produced APK to VR_Project-Pico-arm64.apk so both vendors' APKs
; co-exist on disk. See Devlog 2026-06-08 follow-up entry for the design.

[HMDPluginPriority]
OpenXR=10
PICOXRHMD=0

