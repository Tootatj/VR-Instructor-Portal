; --- Phase 7 instructor-view rebuild (2026-06-15): class-path remap ---
; BP_InstructorViewLogic was authored in the colleague's project where the
; C++ module is named "PICOOOO" — so the BP serialised references to
; URenderHijackingSubsystem as "/Script/PICOOOO.RenderHijackingSubsystem".
; In our project the same class lives at "/Script/VR_Project.RenderHijack-
; ingSubsystem" (we renamed PICOOOO_API -> VR_PROJECT_API on import).
; Without this redirect the BP loads with broken Get Subsystem nodes +
; degraded-to-self function calls (Compile shows: "Could not find a
; function named 'StartRenderHijacking' in 'BP_InstructorViewLogic'").
;
; CoreRedirects are applied at editor startup so any edit here requires
; a full editor restart to take effect. Safe to remove once the BP has
; been re-saved against the new class path (UE bakes the resolved ref
; back into the .uasset on save).

[CoreRedirects]
+ClassRedirects=(OldName="/Script/PICOOOO.RenderHijackingSubsystem", NewName="/Script/VR_Project.RenderHijackingSubsystem")
+PackageRedirects=(OldName="/Script/PICOOOO", NewName="/Script/VR_Project")

